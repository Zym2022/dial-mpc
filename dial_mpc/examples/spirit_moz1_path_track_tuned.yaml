# DIAL-MPC tuned lightweight Spirit MOZ1 path tracking profile
seed: 0
output_dir: spirit_moz1_path_track_tuned
n_steps: 100

env_name: spirit_moz1_path_track
Nsample: 6
Hsample: 10
Hnode: 5
Ndiffuse: 1
Ndiffuse_init: 1
temp_sample: 0.1
horizon_diffuse_factor: 0.95
traj_diffuse_factor: 0.3
sigma_scale: 0.4
update_method: mppi
memory_efficient_rollout: true
collision_mode: primitive
chassis_model: ideal_planar

# Base environment
dt: 0.02
timestep: 0.002
leg_control: torque
action_scale: 1.0

# Spirit MOZ1
task_name: path_track_figure8
randomize_tasks: false
wheel_torque_scale: 1.0
wheel_tau_limit: [45.0, 45.0, 45.0, 45.0]

waist_leg_kp: [1050.0, 1200.0, 1050.0, 900.0, 750.0, 750.0]
waist_leg_kd: [90.0, 60.0, 60.0, 90.0, 60.0, 45.0]
waist_leg_tau_limit: [300.0, 300.0, 280.0, 260.0, 220.0, 220.0]
arm_kp: [200.0, 200.0, 150.0, 150.0, 60.0, 60.0, 60.0]
arm_kd: [20.0, 20.0, 15.0, 15.0, 6.0, 6.0, 6.0]
arm_tau_limit: [60.0, 60.0, 50.0, 50.0, 25.0, 25.0, 25.0]

path_amp_x: 0.8
path_amp_y: 0.6
path_omega: 0.25
path_center_xy: [0.0, 0.0]
z_ref: 0.08
waist_leg_action_range_scale: 0.075
arm_action_range_scale: 0.045
command_ramp_time: 0.5
waist_leg_ref_delta: [0.0, 0.0, 0.0, -0.05, 0.0, 0.0]

reward_pos_weight: 6.0
reward_yaw_weight: 1.5
reward_vel_weight: 4.0
reward_upright_weight: 2.0
reward_height_weight: 0.8
reward_ang_vel_weight: 0.15
reward_arm_pose_weight: 0.02
reward_arm_limit_weight: 0.2
reward_waist_pose_weight: 0.01
reward_waist_qd_weight: 0.003
reward_waist_limit_weight: 0.3
reward_ctrl_weight: 0.002
reward_ctrl_rate_weight: 0.005
