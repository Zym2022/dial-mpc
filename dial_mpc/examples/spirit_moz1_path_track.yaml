# DIAL-MPC
seed: 0
output_dir: spirit_moz1_path_track
n_steps: 200

env_name: spirit_moz1_path_track
# Memory-safe defaults for large MJX models in WSL:
# increase these gradually after the first successful run.
Nsample: 128
Hsample: 10
Hnode: 4
Ndiffuse: 1
Ndiffuse_init: 2
temp_sample: 0.08
horizon_diffuse_factor: 0.95
traj_diffuse_factor: 0.4
sigma_scale: 0.5
update_method: mppi
memory_efficient_rollout: true

# Base environment
dt: 0.02
timestep: 0.002
leg_control: torque
action_scale: 1.0

# Spirit MOZ1
task_name: path_track_figure8
randomize_tasks: false
wheel_torque_scale: 1.0
wheel_tau_limit: [40.0, 40.0, 40.0, 40.0]

waist_leg_kp: [7000.0, 8000.0, 7000.0, 6000.0, 5000.0, 5000.0]
waist_leg_kd: [600.0, 400.0, 400.0, 600.0, 400.0, 300.0]
waist_leg_tau_limit: [400.0, 400.0, 350.0, 300.0, 250.0, 250.0]
arm_kp: [200.0, 200.0, 150.0, 150.0, 60.0, 60.0, 60.0]
arm_kd: [20.0, 20.0, 15.0, 15.0, 6.0, 6.0, 6.0]
arm_tau_limit: [80.0, 80.0, 60.0, 60.0, 30.0, 30.0, 30.0]

path_amp_x: 1.0
path_amp_y: 0.8
path_omega: 0.35
path_center_xy: [0.0, 0.0]
z_ref: 0.463
